<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gerenciar Atualizações • Amigos Solidários</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    /* ─── TOKENS GLOBAIS ─── */
    :root {
      --primary: #ff0452;
      --primary-dark: #c8003f;
      --primary-light: #fff0f3;
      --primary-glow: rgba(255, 4, 82, 0.18);

      --accent: #4361ee;
      --accent-light: #eef2ff;
      --accent-dark: #3451d1;

      --success: #10b981;
      --success-light: #ecfdf5;
      --warning: #f59e0b;
      --warning-hover: #d97706;
      --danger: #ef4444;
      --danger-hover: #dc2626;
      --danger-light: #fef2f2;

      --gray-50:  #f9fafb;
      --gray-100: #f3f4f6;
      --gray-200: #e5e7eb;
      --gray-300: #d1d5db;
      --gray-400: #9ca3af;
      --gray-500: #6b7280;
      --gray-600: #4b5563;
      --gray-700: #374151;
      --gray-800: #1f2937;
      --gray-900: #111827;

      --radius-sm: 6px;
      --radius: 10px;
      --radius-lg: 16px;
      --radius-xl: 24px;
      --radius-full: 9999px;

      --shadow-sm: 0 1px 3px rgba(0,0,0,0.07);
      --shadow:    0 4px 12px rgba(0,0,0,0.08);
      --shadow-lg: 0 16px 32px rgba(0,0,0,0.10);
      --shadow-primary: 0 8px 20px var(--primary-glow);

      --transition: all 0.22s ease;
      --navbar-height: 76px;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--gray-50);
      color: var(--gray-800);
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ─── NAVBAR ─── */
    header {
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      background: #fff;
      border-bottom: 1px solid var(--gray-200);
      box-shadow: var(--shadow-sm);
      z-index: 300;
      height: var(--navbar-height);
    }

    #navbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      max-width: 1320px;
      margin: 0 auto;
      height: 100%;
      gap: 2rem;
    }

    .nav_img { height: 50px; display: block; }

    #nav_list {
      display: flex;
      align-items: center;
      gap: 0.25rem;
      list-style: none;
    }

    .nav-item a {
      display: block;
      text-decoration: none;
      color: var(--gray-500);
      font-weight: 500;
      font-size: 0.9rem;
      padding: 0.45rem 0.9rem;
      border-radius: var(--radius);
      transition: var(--transition);
    }
    .nav-item a:hover { color: var(--primary); background: var(--primary-light); }
    .nav-item.active a { color: var(--primary); background: var(--primary-light); font-weight: 700; }

    .nav-toggle {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      padding: 6px;
      border-radius: var(--radius-sm);
      border: none;
      background: transparent;
    }
    .nav-toggle span { display: block; width: 22px; height: 2px; background: var(--gray-700); border-radius: 2px; transition: var(--transition); }

    /* ─── PAGE LAYOUT ─── */
    .container {
      max-width: 1280px;
      margin: 0 auto;
      padding: calc(var(--navbar-height) + 2.5rem) 2rem 4rem;
    }

    .page-header {
      margin-bottom: 2rem;
    }

    .page-header h1 {
      font-size: 1.75rem;
      font-weight: 800;
      color: var(--gray-900);
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .page-header h1 i { color: var(--primary); font-size: 1.5rem; }
    .page-header p { color: var(--gray-500); font-size: 0.9rem; margin-top: 0.3rem; }

    .grid-container {
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 2rem;
      align-items: start;
    }

    /* ─── FORM SECTION ─── */
    .form-panel {
      background: #fff;
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      border: 1.5px solid var(--gray-200);
      padding: 2rem;
      position: sticky;
      top: calc(var(--navbar-height) + 1.5rem);
    }

    .form-panel h2 {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--gray-900);
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .form-panel h2 i { color: var(--primary); }

    .form-group { margin-bottom: 1.1rem; }

    label {
      display: block;
      font-weight: 600;
      color: var(--gray-700);
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 0.4rem;
    }

    input[type="text"], input[type="file"] {
      width: 100%;
      padding: 0.7rem 1rem;
      border: 1.5px solid var(--gray-200);
      border-radius: var(--radius);
      font-size: 0.9rem;
      font-family: inherit;
      background: var(--gray-50);
      color: var(--gray-800);
      transition: var(--transition);
    }

    input[type="text"]:focus {
      outline: none;
      border-color: var(--accent);
      background: #fff;
      box-shadow: 0 0 0 3px rgba(67,97,238,0.1);
    }

    input[type="file"] { cursor: pointer; }
    input[type="file"]::-webkit-file-upload-button {
      background: var(--gray-100);
      border: 1px solid var(--gray-300);
      border-radius: var(--radius-sm);
      padding: 4px 10px;
      font-size: 0.8rem;
      font-family: inherit;
      cursor: pointer;
      margin-right: 8px;
      transition: var(--transition);
    }
    input[type="file"]::-webkit-file-upload-button:hover { background: var(--gray-200); }

    .btn-group { display: flex; gap: 0.65rem; margin-top: 1.25rem; flex-wrap: wrap; }

    .btn-publicar {
      flex: 1;
      padding: 0.8rem 1rem;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: 0.875rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      box-shadow: var(--shadow-primary);
      transition: var(--transition);
    }
    .btn-publicar:hover { background: var(--primary-dark); transform: translateY(-2px); }
    .btn-publicar:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .btn-cancel {
      padding: 0.8rem 1rem;
      background: var(--gray-100);
      color: var(--gray-700);
      border: 1.5px solid var(--gray-200);
      border-radius: var(--radius);
      font-size: 0.875rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      display: none;
      align-items: center;
      gap: 0.4rem;
      transition: var(--transition);
    }
    .btn-cancel:hover { background: var(--gray-200); }

    /* ─── LIST SECTION ─── */
    .list-panel h2 {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--gray-900);
      margin-bottom: 1.25rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .list-panel h2 i { color: var(--primary); }

    .count-badge {
      margin-left: auto;
      background: var(--accent-light);
      color: var(--accent);
      font-size: 0.72rem;
      font-weight: 700;
      padding: 0.2rem 0.6rem;
      border-radius: var(--radius-full);
    }

    #atualizacoes {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1.25rem;
    }

    /* ─── QR CARD ─── */
    .qr-card {
      background: #fff;
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
      border: 1.5px solid var(--gray-200);
      transition: var(--transition);
      display: flex;
      flex-direction: column;
      animation: fadeIn 0.3s ease both;
    }
    .qr-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); border-color: var(--primary-glow); }

    .qr-container {
      padding: 1.25rem 1.25rem 0;
      text-align: center;
      background: var(--gray-50);
    }

    .qr-image {
      width: 100%;
      max-height: 200px;
      object-fit: cover;
      border-radius: var(--radius);
      border: 1px solid var(--gray-200);
      background: #fff;
    }

    .qr-placeholder {
      width: 100%;
      height: 160px;
      background: var(--gray-100);
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--gray-400);
      font-size: 0.85rem;
      border: 1.5px dashed var(--gray-300);
    }
    .qr-placeholder i { font-size: 2rem; display: block; margin-bottom: 0.4rem; color: var(--gray-300); }

    .qr-title {
      padding: 1rem 1.1rem;
      flex-grow: 1;
      font-size: 0.88rem;
      color: var(--gray-700);
      line-height: 1.5;
      font-weight: 500;
    }

    .qr-actions {
      display: flex;
      padding: 0 1.1rem 1.1rem;
      gap: 0.65rem;
    }

    .btn-editar, .btn-excluir {
      flex: 1;
      padding: 0.65rem;
      border: none;
      border-radius: var(--radius);
      font-weight: 600;
      font-size: 0.8rem;
      font-family: inherit;
      cursor: pointer;
      transition: var(--transition);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.35rem;
    }

    .btn-editar { background: var(--warning); color: #fff; }
    .btn-editar:hover { background: var(--warning-hover); transform: translateY(-1px); }

    .btn-excluir { background: var(--danger); color: #fff; }
    .btn-excluir:hover { background: var(--danger-hover); transform: translateY(-1px); }

    /* ─── STATES ─── */
    .loading {
      grid-column: 1/-1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4rem 0;
      color: var(--gray-500);
      gap: 1rem;
    }
    .loading-ring {
      width: 36px; height: 36px;
      border: 3px solid var(--gray-200);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    .empty-state {
      grid-column: 1/-1;
      text-align: center;
      padding: 3.5rem 1rem;
      color: var(--gray-400);
    }
    .empty-state i { font-size: 3rem; display: block; margin-bottom: 0.75rem; }
    .empty-state p { font-size: 1rem; margin-bottom: 0.3rem; color: var(--gray-500); }
    .empty-state small { font-size: 0.82rem; }

    /* ─── TOAST ─── */
    .toast-container {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .toast {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.85rem 1.2rem;
      border-radius: var(--radius);
      color: #fff;
      font-size: 0.85rem;
      font-weight: 600;
      box-shadow: var(--shadow-lg);
      animation: toastIn 0.3s ease, toastOut 0.3s ease 2.7s forwards;
      min-width: 240px;
    }
    .toast.success { background: var(--success); }
    .toast.error   { background: var(--danger); }
    .toast.info    { background: var(--accent); }

    /* ─── ANIMATIONS ─── */
    @keyframes spin    { to { transform: rotate(360deg); } }
    @keyframes fadeIn  { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
    @keyframes toastIn { from { opacity: 0; transform: translateX(40px); } to { opacity: 1; transform: none; } }
    @keyframes toastOut { to { opacity: 0; transform: translateX(40px); } }

    /* ─── RESPONSIVO ─── */
    @media (max-width: 960px) {
      .grid-container { grid-template-columns: 1fr; }
      .form-panel { position: static; }
    }

    @media (max-width: 700px) {
      #navbar { padding: 0 1.25rem; }
      .nav-toggle { display: flex; }
      #nav_list {
        display: none;
        flex-direction: column;
        position: absolute;
        top: var(--navbar-height);
        left: 0; right: 0;
        background: #fff;
        border-bottom: 1px solid var(--gray-200);
        padding: 0.75rem 1.25rem 1rem;
        gap: 0.25rem;
        box-shadow: var(--shadow);
      }
      #nav_list.open { display: flex; }
      .nav-item a { padding: 0.6rem 0.75rem; font-size: 0.95rem; }

      .container { padding: calc(var(--navbar-height) + 1.5rem) 1.25rem 3rem; }
      .page-header h1 { font-size: 1.35rem; }
      #atualizacoes { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="toast-container" id="toastContainer"></div>

  <header>
    <nav id="navbar">
      <a href="index.html">
        <img src="src/img/Amigos Solidários.png" alt="Amigos Solidários" class="nav_img">
      </a>
      <button class="nav-toggle" id="navToggle" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
      <ul id="nav_list">
        <li class="nav-item"><a href="eventos.html">Eventos</a></li>
        <li class="nav-item active"><a href="atualizacoes.html">Atualizações</a></li>
        <li class="nav-item"><a href="dashboard.html">Dashboard</a></li>
      </ul>
    </nav>
  </header>

  <div class="container">
    <div class="page-header">
      <h1><i class="fas fa-bell"></i> Gerenciar Atualizações</h1>
      <p>Publique, edite e remova atualizações exibidas no site.</p>
    </div>

    <div class="grid-container">
      <!-- Formulário -->
      <div class="form-panel">
        <h2><i class="fas fa-plus-circle"></i> Nova Atualização</h2>
        <form id="atualizacaoForm">
          <div class="form-group">
            <label for="texto">Texto da atualização *</label>
            <input type="text" id="texto" name="texto" placeholder="Ex: Hoje realizamos uma ação incrível..." required>
          </div>
          <div class="form-group">
            <label for="imagem">Imagem (opcional)</label>
            <input type="file" id="imagem" name="file-1" accept="image/*">
          </div>
          <div class="btn-group">
            <button type="submit" class="btn-publicar" id="btnSubmit">
              <i class="fas fa-paper-plane"></i>
              <span id="btnText">Publicar Atualização</span>
            </button>
            <button type="button" id="cancelEdit" class="btn-cancel">
              <i class="fas fa-times"></i> Cancelar
            </button>
          </div>
        </form>
      </div>

      <!-- Lista -->
      <div class="list-panel">
        <h2>
          <i class="fas fa-list"></i> Publicadas
          <span class="count-badge" id="countBadge">0</span>
        </h2>
        <div id="atualizacoes">
          <div class="loading"><div class="loading-ring"></div><p>Carregando...</p></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const apiUrl = "https://api.voluntariosdasaude.com.br/api/gerencia/atualizacoes";
    const loginUrl = "index.html";

    // ─── Auth ─────────────────────────────────────────────────────────────────
    if (!localStorage.getItem("token")) window.location.href = loginUrl;

    // ─── Toast ────────────────────────────────────────────────────────────────
    function showToast(msg, type = 'info') {
      const icons = { success: 'fas fa-check-circle', error: 'fas fa-exclamation-circle', info: 'fas fa-info-circle' };
      const c = document.getElementById('toastContainer');
      const t = document.createElement('div');
      t.className = `toast ${type}`;
      t.innerHTML = `<i class="${icons[type]}"></i><span>${msg}</span>`;
      c.appendChild(t);
      setTimeout(() => t.remove(), 3200);
    }

    // ─── Elements ─────────────────────────────────────────────────────────────
    const form      = document.getElementById("atualizacaoForm");
    const btnText   = document.getElementById("btnText");
    const btnSubmit = document.getElementById("btnSubmit");
    const cancelBtn = document.getElementById("cancelEdit");
    const lista     = document.getElementById("atualizacoes");

    // ─── Submit ───────────────────────────────────────────────────────────────
    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const textoVal = form.texto.value.trim();
      if (!textoVal) { showToast("O campo texto é obrigatório.", "error"); return; }

      const formData = new FormData();
      formData.append("texto", textoVal);
      if (form["file-1"].files[0]) formData.append("file-1", form["file-1"].files[0]);

      const id     = form.dataset.id;
      const method = id ? "PUT" : "POST";
      const url    = id ? `${apiUrl}/${id}` : apiUrl;

      btnSubmit.disabled = true;
      btnText.textContent = id ? "Atualizando..." : "Publicando...";

      try {
        const response = await fetch(url, {
          method,
          headers: { "Authorization": `Bearer ${localStorage.getItem("token")}` },
          body: formData
        });

        if (response.ok) {
          showToast(id ? "Atualização editada com sucesso!" : "Atualização publicada!", "success");
          form.reset();
          delete form.dataset.id;
          btnText.textContent = "Publicar Atualização";
          cancelBtn.style.display = "none";
          carregarAtualizacoes();
        } else {
          const erro = await response.text();
          showToast("Erro: " + (erro || "Permissão negada"), "error");
          if (response.status === 401 || response.status === 403) window.location.href = loginUrl;
        }
      } catch (err) {
        showToast("Erro de conexão: " + err.message, "error");
      } finally {
        btnSubmit.disabled = false;
        btnText.textContent = form.dataset.id ? "Salvar Alterações" : "Publicar Atualização";
      }
    });

    cancelBtn.addEventListener("click", () => {
      form.reset();
      delete form.dataset.id;
      btnText.textContent = "Publicar Atualização";
      cancelBtn.style.display = "none";
    });

    // ─── Carregar ─────────────────────────────────────────────────────────────
    async function carregarAtualizacoes() {
      lista.innerHTML = `<div class="loading"><div class="loading-ring"></div><p>Carregando...</p></div>`;

      try {
        const res  = await fetch(apiUrl);
        const dados = await res.json();

        document.getElementById('countBadge').textContent = dados?.length || 0;

        if (!dados || dados.length === 0) {
          lista.innerHTML = `
            <div class="empty-state">
              <i class="fas fa-photo-film"></i>
              <p>Nenhuma atualização publicada</p>
              <small>Use o formulário ao lado para publicar a primeira!</small>
            </div>`;
          return;
        }

        lista.innerHTML = "";
        dados.forEach((item, i) => {
          const card = document.createElement("div");
          card.className = "qr-card";
          card.style.animationDelay = `${i * 40}ms`;

          const textoSeguro = item.texto?.replace(/'/g, "\\'") || "";

          card.innerHTML = `
            <div class="qr-container">
              ${item.imagem
                ? `<img src="${item.imagem}" alt="Imagem" class="qr-image" onerror="this.src='https://placehold.co/280x180/f3f4f6/9ca3af?text=Sem+imagem'">`
                : `<div class="qr-placeholder"><i class="fas fa-image"></i>Sem imagem</div>`}
            </div>
            <p class="qr-title">${item.texto || "Sem título"}</p>
            <div class="qr-actions">
              <button class="btn-editar" onclick="editar(${item.id}, '${textoSeguro}')">
                <i class="fas fa-pencil"></i> Editar
              </button>
              <button class="btn-excluir" onclick="deletar(${item.id})">
                <i class="fas fa-trash"></i> Excluir
              </button>
            </div>
          `;
          lista.appendChild(card);
        });
      } catch (err) {
        lista.innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><p>Erro ao carregar atualizações</p></div>`;
      }
    }

    // ─── Editar / Excluir ─────────────────────────────────────────────────────
    function editar(id, texto) {
      form.texto.value = texto;
      form.dataset.id  = id;
      btnText.textContent = "Salvar Alterações";
      cancelBtn.style.display = "inline-flex";
      document.querySelector('.form-panel').scrollIntoView({ behavior: "smooth", block: "start" });
      showToast("Editando atualização — faça as alterações e publique.", "info");
    }

    async function deletar(id) {
      if (!confirm("Excluir esta atualização permanentemente?")) return;
      try {
        const res = await fetch(`${apiUrl}/${id}`, {
          method: "DELETE",
          headers: { "Authorization": `Bearer ${localStorage.getItem("token")}` }
        });
        if (res.ok) {
          showToast("Atualização excluída!", "success");
          carregarAtualizacoes();
        } else {
          showToast("Erro ao excluir.", "error");
          if (res.status === 401) window.location.href = loginUrl;
        }
      } catch (err) {
        showToast("Erro: " + err.message, "error");
      }
    }

    // ─── Hamburger ────────────────────────────────────────────────────────────
    document.getElementById('navToggle').addEventListener('click', () => {
      document.getElementById('nav_list').classList.toggle('open');
    });

    carregarAtualizacoes();
  </script>
</body>
</html>
