<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gerenciar Eventos • Amigos Solidários</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    /* ─── TOKENS GLOBAIS ─── */
    :root {
      --primary: #ff0452;
      --primary-dark: #c8003f;
      --primary-light: #fff0f3;
      --primary-glow: rgba(255, 4, 82, 0.18);

      --accent: #4361ee;
      --accent-light: #eef2ff;

      --success: #10b981;
      --success-light: #ecfdf5;
      --warning: #f59e0b;
      --warning-hover: #d97706;
      --danger: #ef4444;
      --danger-hover: #dc2626;
      --danger-light: #fef2f2;

      --gray-50:  #f9fafb;
      --gray-100: #f3f4f6;
      --gray-200: #e5e7eb;
      --gray-300: #d1d5db;
      --gray-400: #9ca3af;
      --gray-500: #6b7280;
      --gray-600: #4b5563;
      --gray-700: #374151;
      --gray-800: #1f2937;
      --gray-900: #111827;

      --radius-sm: 6px;
      --radius: 10px;
      --radius-lg: 16px;
      --radius-xl: 24px;
      --radius-full: 9999px;

      --shadow-sm: 0 1px 3px rgba(0,0,0,0.07);
      --shadow:    0 4px 12px rgba(0,0,0,0.08);
      --shadow-lg: 0 16px 32px rgba(0,0,0,0.10);
      --shadow-primary: 0 8px 20px var(--primary-glow);

      --transition: all 0.22s ease;
      --navbar-height: 76px;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--gray-50);
      color: var(--gray-800);
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ─── NAVBAR ─── */
    header {
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      background: #fff;
      border-bottom: 1px solid var(--gray-200);
      box-shadow: var(--shadow-sm);
      z-index: 300;
      height: var(--navbar-height);
    }

    #navbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      max-width: 1320px;
      margin: 0 auto;
      height: 100%;
      gap: 2rem;
    }

    .nav_img { height: 50px; display: block; }

    #nav_list {
      display: flex;
      align-items: center;
      gap: 0.25rem;
      list-style: none;
    }

    .nav-item a {
      display: block;
      text-decoration: none;
      color: var(--gray-500);
      font-weight: 500;
      font-size: 0.9rem;
      padding: 0.45rem 0.9rem;
      border-radius: var(--radius);
      transition: var(--transition);
    }
    .nav-item a:hover { color: var(--primary); background: var(--primary-light); }
    .nav-item.active a { color: var(--primary); background: var(--primary-light); font-weight: 700; }

    .nav-toggle {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      padding: 6px;
      border-radius: var(--radius-sm);
      border: none;
      background: transparent;
    }
    .nav-toggle span { display: block; width: 22px; height: 2px; background: var(--gray-700); border-radius: 2px; transition: var(--transition); }

    /* ─── PAGE LAYOUT ─── */
    .container {
      max-width: 1280px;
      margin: 0 auto;
      padding: calc(var(--navbar-height) + 2.5rem) 2rem 4rem;
    }

    .page-header {
      margin-bottom: 2rem;
    }

    .page-header h1 {
      font-size: 1.75rem;
      font-weight: 800;
      color: var(--gray-900);
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    .page-header h1 i { color: var(--primary); font-size: 1.5rem; }
    .page-header p { color: var(--gray-500); font-size: 0.9rem; margin-top: 0.3rem; }

    .grid-container {
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 2rem;
      align-items: start;
    }

    /* ─── FORM PANEL ─── */
    .form-panel {
      background: #fff;
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      border: 1.5px solid var(--gray-200);
      padding: 2rem;
      position: sticky;
      top: calc(var(--navbar-height) + 1.5rem);
    }

    .form-panel h2 {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--gray-900);
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .form-panel h2 i { color: var(--primary); }

    .form-group { margin-bottom: 1.1rem; }

    label {
      display: block;
      font-weight: 600;
      color: var(--gray-700);
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 0.4rem;
    }

    small { font-size: 0.78rem; color: var(--gray-400); display: block; margin-top: 0.25rem; }

    input[type="text"], input[type="file"] {
      width: 100%;
      padding: 0.7rem 1rem;
      border: 1.5px solid var(--gray-200);
      border-radius: var(--radius);
      font-size: 0.9rem;
      font-family: inherit;
      background: var(--gray-50);
      color: var(--gray-800);
      transition: var(--transition);
    }
    input[type="text"]:focus {
      outline: none;
      border-color: var(--accent);
      background: #fff;
      box-shadow: 0 0 0 3px rgba(67,97,238,0.1);
    }
    input[type="file"] { cursor: pointer; }
    input[type="file"]::-webkit-file-upload-button {
      background: var(--gray-100);
      border: 1px solid var(--gray-300);
      border-radius: var(--radius-sm);
      padding: 4px 10px;
      font-size: 0.8rem;
      font-family: inherit;
      cursor: pointer;
      margin-right: 8px;
      transition: var(--transition);
    }
    input[type="file"]::-webkit-file-upload-button:hover { background: var(--gray-200); }

    /* Image preview */
    .img-preview-wrap { margin-top: 0.5rem; display: none; }
    .img-preview-wrap img {
      width: 100%;
      max-height: 140px;
      object-fit: cover;
      border-radius: var(--radius);
      border: 1px solid var(--gray-200);
    }

    .btn-group { display: flex; gap: 0.65rem; margin-top: 1.25rem; flex-wrap: wrap; }

    .btn-primary-action {
      flex: 1;
      padding: 0.8rem 1rem;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: 0.875rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      box-shadow: var(--shadow-primary);
      transition: var(--transition);
    }
    .btn-primary-action:hover { background: var(--primary-dark); transform: translateY(-2px); }
    .btn-primary-action:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .btn-cancel {
      padding: 0.8rem 1rem;
      background: var(--gray-100);
      color: var(--gray-700);
      border: 1.5px solid var(--gray-200);
      border-radius: var(--radius);
      font-size: 0.875rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      display: none;
      align-items: center;
      gap: 0.4rem;
      transition: var(--transition);
    }
    .btn-cancel:hover { background: var(--gray-200); }

    /* ─── LIST PANEL ─── */
    .list-panel h2 {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--gray-900);
      margin-bottom: 1.25rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .list-panel h2 i { color: var(--primary); }

    .count-badge {
      margin-left: auto;
      background: var(--accent-light);
      color: var(--accent);
      font-size: 0.72rem;
      font-weight: 700;
      padding: 0.2rem 0.6rem;
      border-radius: var(--radius-full);
    }

    /* ─── EVENTS GRID ─── */
    .events-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1.25rem;
    }

    .event-card {
      background: #fff;
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
      border: 1.5px solid var(--gray-200);
      transition: var(--transition);
      display: flex;
      flex-direction: column;
      animation: fadeIn 0.3s ease both;
    }
    .event-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); border-color: rgba(255,4,82,0.15); }

    .event-image {
      width: 100%;
      height: 175px;
      object-fit: cover;
      display: block;
      background: var(--gray-100);
    }

    .event-content {
      padding: 1.1rem 1.1rem 0.5rem;
      flex-grow: 1;
    }

    .event-text {
      font-size: 0.88rem;
      color: var(--gray-700);
      line-height: 1.55;
      font-weight: 500;
      margin-bottom: 0.75rem;
    }

    .event-actions {
      display: flex;
      gap: 0.65rem;
      padding: 0 1.1rem 1.1rem;
    }

    .btn-edit, .btn-danger {
      flex: 1;
      padding: 0.65rem;
      border: none;
      border-radius: var(--radius);
      font-weight: 600;
      font-size: 0.8rem;
      font-family: inherit;
      cursor: pointer;
      transition: var(--transition);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.35rem;
    }
    .btn-edit { background: var(--warning); color: #fff; }
    .btn-edit:hover { background: var(--warning-hover); transform: translateY(-1px); }

    .btn-danger { background: var(--danger); color: #fff; }
    .btn-danger:hover { background: var(--danger-hover); transform: translateY(-1px); }

    /* ─── STATES ─── */
    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4rem 0;
      color: var(--gray-500);
      gap: 1rem;
    }
    .loading-ring {
      width: 36px; height: 36px;
      border: 3px solid var(--gray-200);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    .empty-state {
      text-align: center;
      padding: 3.5rem 1rem;
      color: var(--gray-400);
    }
    .empty-state i { font-size: 3rem; display: block; margin-bottom: 0.75rem; }
    .empty-state p { font-size: 1rem; margin-bottom: 0.3rem; color: var(--gray-500); }
    .empty-state small { font-size: 0.82rem; }

    /* ─── TOAST ─── */
    .toast-container {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .toast {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.85rem 1.2rem;
      border-radius: var(--radius);
      color: #fff;
      font-size: 0.85rem;
      font-weight: 600;
      box-shadow: var(--shadow-lg);
      animation: toastIn 0.3s ease, toastOut 0.3s ease 2.7s forwards;
      min-width: 240px;
    }
    .toast.success { background: var(--success); }
    .toast.error   { background: var(--danger); }
    .toast.info    { background: var(--accent); }

    /* ─── ANIMATIONS ─── */
    @keyframes spin    { to { transform: rotate(360deg); } }
    @keyframes fadeIn  { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
    @keyframes toastIn { from { opacity: 0; transform: translateX(40px); } to { opacity: 1; transform: none; } }
    @keyframes toastOut { to { opacity: 0; transform: translateX(40px); } }

    /* ─── RESPONSIVO ─── */
    @media (max-width: 960px) {
      .grid-container { grid-template-columns: 1fr; }
      .form-panel { position: static; }
    }

    @media (max-width: 700px) {
      #navbar { padding: 0 1.25rem; }
      .nav-toggle { display: flex; }
      #nav_list {
        display: none;
        flex-direction: column;
        position: absolute;
        top: var(--navbar-height);
        left: 0; right: 0;
        background: #fff;
        border-bottom: 1px solid var(--gray-200);
        padding: 0.75rem 1.25rem 1rem;
        gap: 0.25rem;
        box-shadow: var(--shadow);
      }
      #nav_list.open { display: flex; }
      .nav-item a { padding: 0.6rem 0.75rem; font-size: 0.95rem; }

      .container { padding: calc(var(--navbar-height) + 1.5rem) 1.25rem 3rem; }
      .page-header h1 { font-size: 1.35rem; }
      .events-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="toast-container" id="toastContainer"></div>

  <header>
    <nav id="navbar">
      <a href="index.html">
        <img src="src/img/Amigos Solidários.png" alt="Amigos Solidários" class="nav_img">
      </a>
      <button class="nav-toggle" id="navToggle" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
      <ul id="nav_list">
        <li class="nav-item active"><a href="eventos.html">Eventos</a></li>
        <li class="nav-item"><a href="atualizacoes.html">Atualizações</a></li>
        <li class="nav-item"><a href="dashboard.html">Dashboard</a></li>
      </ul>
    </nav>
  </header>

  <div class="container">
    <div class="page-header">
      <h1><i class="fas fa-calendar-star"></i> Gerenciar Eventos</h1>
      <p>Adicione, edite e remova eventos exibidos no site.</p>
    </div>

    <div class="grid-container">
      <!-- Formulário -->
      <div class="form-panel">
        <h2><i class="fas fa-plus-circle"></i> Novo Evento</h2>
        <form id="eventoForm">
          <div class="form-group">
            <label for="texto">Texto do evento *</label>
            <input type="text" name="texto" id="texto" placeholder="Digite a descrição do evento..." required>
          </div>

          <div class="form-group">
            <label for="file-1">Imagem do evento</label>
            <input type="file" name="file-1" id="file-1" accept="image/*">
            <small>Deixe em branco se estiver editando apenas o texto.</small>
            <div class="img-preview-wrap" id="previewWrap">
              <img id="imgPreview" src="" alt="Preview">
            </div>
          </div>

          <div class="btn-group">
            <button type="submit" class="btn-primary-action" id="btnSubmit">
              <i class="fas fa-save"></i>
              <span id="btnText">Publicar Evento</span>
            </button>
            <button type="button" id="cancelEdit" class="btn-cancel">
              <i class="fas fa-times"></i> Cancelar
            </button>
          </div>
        </form>
      </div>

      <!-- Lista -->
      <div class="list-panel">
        <h2>
          <i class="fas fa-list-ul"></i> Eventos Cadastrados
          <span class="count-badge" id="countBadge">0</span>
        </h2>
        <div id="eventos">
          <div class="loading"><div class="loading-ring"></div><p>Carregando eventos...</p></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const apiUrl  = "https://api.voluntariosdasaude.com.br/api/gerencia/eventos";
    const loginUrl = "index.html";

    // ─── Auth & JWT ───────────────────────────────────────────────────────────
    const token = localStorage.getItem("token");

    if (!token) {
      window.location.href = loginUrl;
    } else {
      try {
        function parseJwt(t) {
          const base64Url = t.split('.')[1];
          const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
          return JSON.parse(decodeURIComponent(atob(base64).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join('')));
        }
        const decoded = parseJwt(token);
        const now = Date.now() / 1000;
        if (!decoded.exp || decoded.exp < now) {
          showToast("Sessão expirada. Redirecionando...", "error");
          localStorage.removeItem("token");
          setTimeout(() => window.location.href = loginUrl, 1500);
        }
        if (!decoded.role || decoded.role !== "ADMIN") {
          showToast("Acesso negado. Apenas administradores.", "error");
          setTimeout(() => window.location.href = loginUrl, 1500);
        }
      } catch (error) {
        localStorage.removeItem("token");
        window.location.href = loginUrl;
      }
    }

    // ─── Toast ────────────────────────────────────────────────────────────────
    function showToast(msg, type = 'info') {
      const icons = { success: 'fas fa-check-circle', error: 'fas fa-exclamation-circle', info: 'fas fa-info-circle' };
      const c = document.getElementById('toastContainer');
      const t = document.createElement('div');
      t.className = `toast ${type}`;
      t.innerHTML = `<i class="${icons[type]}"></i><span>${msg}</span>`;
      c.appendChild(t);
      setTimeout(() => t.remove(), 3200);
    }

    // ─── Elements ─────────────────────────────────────────────────────────────
    const form      = document.getElementById("eventoForm");
    const btnText   = document.getElementById("btnText");
    const btnSubmit = document.getElementById("btnSubmit");
    const cancelBtn = document.getElementById("cancelEdit");

    // ─── Image preview ────────────────────────────────────────────────────────
    document.getElementById('file-1').addEventListener('change', function() {
      const file = this.files[0];
      const wrap = document.getElementById('previewWrap');
      const img  = document.getElementById('imgPreview');
      if (file) {
        const reader = new FileReader();
        reader.onload = e => { img.src = e.target.result; wrap.style.display = 'block'; };
        reader.readAsDataURL(file);
      } else {
        wrap.style.display = 'none';
      }
    });

    // ─── Submit ───────────────────────────────────────────────────────────────
    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      if (!form.texto.value.trim()) { showToast("O campo texto é obrigatório.", "error"); return; }

      const formData = new FormData();
      formData.append("texto", form.texto.value);

      if (form["file-1"].files[0]) {
        formData.append("file-1", form["file-1"].files[0]);
      } else if (!form.dataset.id) {
        showToast("Selecione uma imagem para o novo evento.", "error");
        return;
      }

      const id     = form.dataset.id;
      const method = id ? "PUT" : "POST";
      const url    = id ? `${apiUrl}/${id}` : apiUrl;

      btnSubmit.disabled = true;
      btnText.textContent = id ? "Atualizando..." : "Salvando...";

      try {
        const response = await fetch(url, {
          method,
          headers: { "Authorization": `Bearer ${token}` },
          body: formData
        });

        if (response.ok) {
          showToast(id ? "Evento atualizado com sucesso!" : "Evento salvo com sucesso!", "success");
          form.reset();
          document.getElementById('previewWrap').style.display = 'none';
          delete form.dataset.id;
          btnText.textContent = "Salvar Evento";
          cancelBtn.style.display = "none";
          carregarEventos();
        } else {
          const error = await response.text();
          showToast(`Erro: ${response.status} - ${error || 'Acesso negado'}`, "error");
          if (response.status === 401 || response.status === 403) window.location.href = loginUrl;
        }
      } catch (error) {
        showToast("Erro na requisição: " + error.message, "error");
      } finally {
        btnSubmit.disabled = false;
        btnText.textContent = form.dataset.id ? "Atualizar Evento" : "Salvar Evento";
        cancelBtn.style.display = form.dataset.id ? "inline-flex" : "none";
      }
    });

    cancelBtn.addEventListener("click", () => {
      form.reset();
      document.getElementById('previewWrap').style.display = 'none';
      delete form.dataset.id;
      btnText.textContent = "Salvar Evento";
      cancelBtn.style.display = "none";
    });

    // ─── Carregar Eventos ─────────────────────────────────────────────────────
    async function carregarEventos() {
      const div = document.getElementById("eventos");
      div.innerHTML = '<div class="loading"><div class="loading-ring"></div><p>Carregando eventos...</p></div>';

      try {
        const response = await fetch(apiUrl);
        const eventos  = await response.json();

        document.getElementById('countBadge').textContent = eventos?.length || 0;

        if (!eventos || eventos.length === 0) {
          div.innerHTML = `
            <div class="empty-state">
              <i class="fas fa-calendar-times"></i>
              <p>Nenhum evento cadastrado ainda.</p>
              <small>Adicione o primeiro evento ao lado!</small>
            </div>`;
          return;
        }

        div.innerHTML = '<div class="events-grid"></div>';
        const grid = div.querySelector('.events-grid');

        eventos.forEach((ev, i) => {
          const card = document.createElement("div");
          card.className = "event-card";
          card.style.animationDelay = `${i * 40}ms`;

          const textoSeguro = ev.texto?.replace(/'/g, "\\'") || "";

          card.innerHTML = `
            <img src="${ev.imagem}" alt="Imagem do evento" class="event-image"
                 onerror="this.src='https://placehold.co/280x175/f3f4f6/9ca3af?text=Imagem+não+encontrada'">
            <div class="event-content">
              <p class="event-text">${ev.texto}</p>
            </div>
            <div class="event-actions">
              <button class="btn-edit" onclick="editarEvento(${ev.id}, '${textoSeguro}')">
                <i class="fas fa-pencil"></i> Editar
              </button>
              <button class="btn-danger" onclick="deletarEvento(${ev.id})">
                <i class="fas fa-trash"></i> Excluir
              </button>
            </div>
          `;
          grid.appendChild(card);
        });

      } catch (error) {
        document.getElementById("eventos").innerHTML = `
          <div class="empty-state">
            <i class="fas fa-exclamation-triangle"></i>
            <p>Erro ao carregar eventos.</p>
            <small>Verifique sua conexão e tente novamente.</small>
          </div>`;
      }
    }

    // ─── Editar / Excluir ─────────────────────────────────────────────────────
    function editarEvento(id, texto) {
      form.texto.value = texto;
      form.dataset.id  = id;
      btnText.textContent = "Atualizar Evento";
      cancelBtn.style.display = "inline-flex";
      document.querySelector('.form-panel').scrollIntoView({ top: 0, behavior: 'smooth' });
      showToast("Editando evento — faça as alterações e salve.", "info");
    }

    async function deletarEvento(id) {
      if (!confirm("Tem certeza que deseja excluir este evento?")) return;

      try {
        const response = await fetch(`${apiUrl}/${id}`, {
          method: "DELETE",
          headers: { "Authorization": `Bearer ${token}` }
        });

        if (response.ok) {
          showToast("Evento deletado com sucesso!", "success");
          carregarEventos();
        } else {
          const error = await response.text();
          showToast(`Erro: ${error || 'Acesso negado'}`, "error");
          if (response.status === 401 || response.status === 403) window.location.href = loginUrl;
        }
      } catch (error) {
        showToast("Erro na exclusão: " + error.message, "error");
      }
    }

    // ─── Hamburger ────────────────────────────────────────────────────────────
    document.getElementById('navToggle').addEventListener('click', () => {
      document.getElementById('nav_list').classList.toggle('open');
    });

    carregarEventos();
  </script>
</body>
</html>
